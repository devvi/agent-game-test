# Shallow Layer Checklist (AC1 — 100% Must Pass)
# Each item must pass for every tester across any single playthrough.
# FAILURE: Any item failing halts the playtest — fix before continuing.
#
# Sections:
#   scene_loading: S-01 to S-08  (8 items)
#   dialogue_system: S-09 to S-20  (12 items)
#   scene_transitions: S-21 to S-27  (7 items)
#   environmental_text: S-28 to S-42  (15 items)
#   sound_system: S-43 to S-45  (3 items)
#   test_suite_baseline: S-46 to S-47  (2 items)

scene_loading:
  - id: "S-01"
    description: "Game launches without errors"
    verification: "No console errors on start"
    pass: false
    notes: ""

  - id: "S-02"
    description: "Office scene loads with all 4 environment text nodes visible"
    verification: "WindowText, ScreensaverText, DesktopText, OfficeDoorTrigger present"
    pass: false
    notes: ""

  - id: "S-03"
    description: "Lobby scene loads with all 3 environment text nodes + 3 triggers"
    verification: "EntranceText, StrangerSpotlight visible; guard/stranger/exit triggers enabled"
    pass: false
    notes: ""

  - id: "S-04"
    description: "Street scene loads with environment text + store entrance trigger"
    verification: "NeonSign, Graffiti, StreetSign, StoreEntranceTrigger present"
    pass: false
    notes: ""

  - id: "S-05"
    description: "Convenience Store loads with OPEN sign, clerk trigger, exit trigger"
    verification: "OpenSign visible, triggers active"
    pass: false
    notes: ""

  - id: "S-06"
    description: "Bridge loads with traffic/homeless/rain text + 3 triggers"
    verification: "TrafficText, HomelessText, RainBridgeText visible; triggers active"
    pass: false
    notes: ""

  - id: "S-07"
    description: "Underpass loads with graffiti/echo/light + 3 triggers"
    verification: "GraffitiText, EchoText, UnderpassLight visible; triggers active"
    pass: false
    notes: ""

  - id: "S-08"
    description: "Subway Station loads with all environment text + 3 trigger zones"
    verification: "TicketGateText, ClockText, BroadcastText, StrangerFinalText visible; triggers active"
    pass: false
    notes: ""

