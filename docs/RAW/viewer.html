<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Issues Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre-d3@0.6.4/dist/dagre-d3.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --cyan: #39d2c0;
    --critical: #f85149;
    --high: #d29922;
    --medium: #58a6ff;
    --low: #8b949e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .hidden { display: none !important; }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .header-left h1 {
    font-size: 20px;
    font-weight: 600;
  }
  .header-left .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-right label {
    font-size: 13px;
    color: var(--text-dim);
  }
  .header-right select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  .header-right select:focus { outline: none; border-color: var(--accent); }

  /* Status badge */
  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-draft { background: #1f2937; color: var(--orange); border: 1px solid var(--orange); }
  .status-approved { background: #0f2d1a; color: var(--green); border: 1px solid var(--green); }
  .status-created { background: #0f2d3a; color: var(--cyan); border: 1px solid var(--cyan); }

  /* Summary bar */
  .summary {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    flex: 1;
    min-width: 120px;
    text-align: center;
  }
  .summary-card .num {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
  }
  .summary-card .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }
  .summary-card .num.critical { color: var(--critical); }
  .summary-card .num.high { color: var(--high); }
  .summary-card .num.medium { color: var(--medium); }
  .summary-card .num.low { color: var(--low); }
  .summary-card .num.total { color: var(--accent); }

  /* Filters */
  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filters label { font-size: 12px; color: var(--text-dim); }
  .filters select, .filters input {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
  }
  .filters input { flex: 1; min-width: 160px; }
  .filters .clear-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .filters .clear-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .filter-count {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* Table */
  .table-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead {
    background: var(--surface2);
    position: sticky;
    top: 0;
  }
  th {
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  th.sortable { cursor: pointer; }
  th.sortable:hover { color: var(--text); }
  th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  th.sorted .sort-arrow { opacity: 1; }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: rgba(88,166,255,0.04); }
  tr.highlight { background: rgba(88,166,255,0.08); }

  .row-critical { border-left: 3px solid var(--critical); }
  .row-high { border-left: 3px solid var(--high); }
  .row-medium { border-left: 3px solid var(--medium); }
  .row-low { border-left: 3px solid var(--low); }

  .priority-tag, .depth-tag, .estimate-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .priority-critical { background: rgba(248,81,73,0.15); color: var(--critical); }
  .priority-high { background: rgba(210,153,34,0.15); color: var(--high); }
  .priority-medium { background: rgba(88,166,255,0.15); color: var(--medium); }
  .priority-low { background: rgba(139,148,158,0.15); color: var(--low); }
  .depth-deep { background: rgba(188,140,255,0.15); color: var(--purple); }
  .depth-standard { background: rgba(57,210,192,0.15); color: var(--cyan); }
  .depth-light { background: rgba(139,148,158,0.15); color: var(--text-dim); }
  .estimate-large { background: rgba(248,81,73,0.12); color: var(--critical); }
  .estimate-medium { background: rgba(210,153,34,0.12); color: var(--high); }
  .estimate-small { background: rgba(63,185,80,0.12); color: var(--green); }

  .issue-title {
    font-weight: 500;
    cursor: pointer;
  }
  .issue-title:hover { color: var(--accent); }
  .issue-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 3px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .deps-badge {
    display: inline-block;
    background: var(--surface2);
    color: var(--text-dim);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 11px;
    margin-right: 3px;
  }
  .deps-badge:hover { color: var(--accent); cursor: pointer; }

  .cell-id {
    font-weight: 600;
    color: var(--text-dim);
    width: 40px;
    font-variant-numeric: tabular-nums;
  }

  /* Graph Panel */
  .graph-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 24px;
    position: relative;
  }
  .graph-panel h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .graph-panel h3 .legend {
    display: flex;
    gap: 12px;
    margin-left: auto;
    font-size: 11px;
    font-weight: 400;
  }
  .graph-panel h3 .legend span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .graph-panel h3 .legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  #graph-container {
    width: 100%;
    min-height: 360px;
    position: relative;
    overflow: auto;
  }
  #graph-container svg {
    display: block;
    margin: 0 auto;
  }
  .graph-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .graph-controls button {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
  }
  .graph-controls button:hover { color: var(--text); border-color: var(--text-dim); }

  /* Issue detail modal */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    max-width: 680px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
  }
  .modal .close-btn {
    position: absolute;
    top: 12px; right: 16px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 22px;
    cursor: pointer;
  }
  .modal .close-btn:hover { color: var(--text); }
  .modal h2 { font-size: 18px; margin-bottom: 4px; }
  .modal .modal-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; }
  .modal h4 { font-size: 13px; color: var(--text-dim); margin: 16px 0 8px; }
  .modal p, .modal ul { font-size: 14px; line-height: 1.6; }
  .modal ul { padding-left: 20px; }
  .modal ul li { margin-bottom: 4px; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  @media (max-width: 768px) {
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .summary { flex-direction: column; }
    .table-wrapper { overflow-x: auto; }
    .issue-desc { -webkit-line-clamp: 1; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1 id="plan-title">📋 Game Issues Viewer</h1>
    <div class="subtitle" id="plan-subtitle">选择一个 Plan 来查看</div>
  </div>
  <div class="header-right">
    <label for="plan-select">Plan:</label>
    <select id="plan-select"><option value="">— 选择 —</option></select>
    <span id="status-badge" class="status-badge hidden"></span>
  </div>
</div>

<div id="empty-state" class="empty-state">
  <div class="icon">📂</div>
  <p>选择一个 Plan 开始审阅，或创建新的分解。</p>
  <p style="font-size:12px;margin-top:8px;">Plan 文件保存在 <code>docs/RAW/game-to-issues-*.json</code></p>
</div>

<div id="main-content" class="hidden">

<div class="summary" id="summary-bar"></div>

<div class="filters">
  <label>🔍</label>
  <input id="search-input" placeholder="搜索标题或描述..." />
  <label>优先级</label>
  <select id="priority-filter">
    <option value="all">全部</option>
    <option value="critical">Critical</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>
  <label>深度</label>
  <select id="depth-filter">
    <option value="all">全部</option>
    <option value="deep">Deep</option>
    <option value="standard">Standard</option>
    <option value="light">Light</option>
  </select>
  <label>工作量</label>
  <select id="estimate-filter">
    <option value="all">全部</option>
    <option value="large">Large</option>
    <option value="medium">Medium</option>
    <option value="small">Small</option>
  </select>
  <button class="clear-btn" id="clear-filters">✕ 清空</button>
  <span class="filter-count" id="filter-count"></span>
</div>

<div class="graph-panel" id="graph-panel">
  <h3>
    <span>🔗 依赖关系图</span>
    <span class="legend">
      <span><span class="dot" style="background:#f85149"></span> Critical</span>
      <span><span class="dot" style="background:#d29922"></span> High</span>
      <span><span class="dot" style="background:#58a6ff"></span> Medium</span>
      <span><span class="dot" style="background:#8b949e"></span> Low</span>
    </span>
  </h3>
  <div class="graph-controls">
    <button id="zoom-in">🔍+</button>
    <button id="zoom-out">🔍−</button>
    <button id="zoom-reset">⟲ 重置</button>
  </div>
  <div id="graph-container"></div>
</div>

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th style="width:40px">#</th>
        <th class="sortable" data-sort="title">Issue <span class="sort-arrow">↑↓</span></th>
        <th style="width:80px" class="sortable" data-sort="priority">优先级 <span class="sort-arrow">↑↓</span></th>
        <th style="width:70px" class="sortable" data-sort="depth">深度 <span class="sort-arrow">↑↓</span></th>
        <th style="width:60px" class="sortable" data-sort="estimate">工作量 <span class="sort-arrow">↑↓</span></th>
        <th style="width:120px">前置依赖</th>
      </tr>
    </thead>
    <tbody id="issues-tbody"></tbody>
  </table>
</div>

</div><!-- main-content -->

<div id="modal-root"></div>

<script>
const plansIndexUrl = 'plans.json';

// ── State ──
let plans = [];
let currentPlanData = null;
let sortCol = null;
let sortDir = 1;
let highlightIssueId = null;

// ── Init ──
document.addEventListener('DOMContentLoaded', async () => {
  await loadPlansIndex();
  setupEventListeners();
  // Check URL param
  const params = new URLSearchParams(window.location.search);
  const planSlug = params.get('plan');
  if (planSlug) {
    const sel = document.getElementById('plan-select');
    // Wait a tick for options to render
    setTimeout(() => { sel.value = planSlug; if (sel.value !== planSlug) { /* try loading directly */ } loadPlan(planSlug); }, 100);
  }
});

// ── Plans Index ──
async function loadPlansIndex() {
  try {
    const resp = await fetch(plansIndexUrl);
    if (!resp.ok) throw new Error('No plans index');
    plans = await resp.json();
  } catch {
    // Fallback: if URL has a plan param, try it directly
    plans = [];
  }
  const sel = document.getElementById('plan-select');
  // Keep existing options that aren't from index (like placeholder)
  const ph = sel.options[0];
  sel.innerHTML = '';
  sel.appendChild(ph);
  // Sort by date desc
  plans.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
  for (const p of plans) {
    const opt = document.createElement('option');
    opt.value = p.slug;
    opt.textContent = p.title;
    sel.appendChild(opt);
  }
}

// ── Load Plan JSON ──
async function loadPlan(slug) {
  const url = `game-to-issues-${slug}.json`;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    currentPlanData = data;
    renderPlan(data);
  } catch (err) {
    document.getElementById('empty-state').classList.remove('hidden');
    document.getElementById('main-content').classList.add('hidden');
    document.getElementById('empty-state').querySelector('p').textContent = `❌ 无法加载: ${url} (${err.message})`;
  }
}

// ── Render ──
function renderPlan(data) {
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('main-content').classList.remove('hidden');

  // Header
  document.getElementById('plan-title').textContent = data.meta.title || 'Untitled Plan';
  const subtitle = document.getElementById('plan-subtitle');
  const created = data.meta.created_at ? new Date(data.meta.created_at).toLocaleString('zh-CN') : '—';
  subtitle.textContent = `${data.meta.total_issues || 0} 个 Issue · ${created} · ${data.meta.model || ''}`;

  // Status
  const badge = document.getElementById('status-badge');
  badge.classList.remove('hidden', 'status-draft', 'status-approved', 'status-created');
  const status = data.meta.status || 'draft';
  badge.textContent = status;
  badge.classList.add(`status-${status}`);

  // Summary
  renderSummary(data.issues);

  // Table
  renderTable(data.issues);

  // Graph
  renderGraph(data);
}

function renderSummary(issues) {
  const bar = document.getElementById('summary-bar');
  const total = issues.length;
  const counts = { critical: 0, high: 0, medium: 0, low: 0 };
  const depths = { deep: 0, standard: 0, light: 0 };
  const estimates = { large: 0, medium: 0, small: 0 };
  for (const i of issues) {
    if (counts[i.priority] !== undefined) counts[i.priority]++;
    if (depths[i.depth] !== undefined) depths[i.depth]++;
    if (estimates[i.estimate] !== undefined) estimates[i.estimate]++;
  }
  bar.innerHTML = `
    <div class="summary-card"><div class="num total">${total}</div><div class="label">全部</div></div>
    <div class="summary-card"><div class="num critical">${counts.critical}</div><div class="label">Critical</div></div>
    <div class="summary-card"><div class="num high">${counts.high}</div><div class="label">High</div></div>
    <div class="summary-card"><div class="num medium">${counts.medium}</div><div class="label">Medium</div></div>
    <div class="summary-card"><div class="num low">${counts.low}</div><div class="label">Low</div></div>
    <div class="summary-card"><div class="num" style="color:var(--purple)">${depths.deep}</div><div class="label">Deep</div></div>
    <div class="summary-card"><div class="num" style="color:var(--cyan)">${depths.standard}</div><div class="label">Std</div></div>
    <div class="summary-card"><div class="num" style="color:var(--text-dim)">${depths.light}</div><div class="label">Light</div></div>
  `;
}

function renderTable(issues) {
  const tbody = document.getElementById('issues-tbody');
  const priorityFilter = document.getElementById('priority-filter').value;
  const depthFilter = document.getElementById('depth-filter').value;
  const estimateFilter = document.getElementById('estimate-filter').value;
  const search = document.getElementById('search-input').value.toLowerCase().trim();

  let filtered = issues.filter(i => {
    if (priorityFilter !== 'all' && i.priority !== priorityFilter) return false;
    if (depthFilter !== 'all' && i.depth !== depthFilter) return false;
    if (estimateFilter !== 'all' && i.estimate !== estimateFilter) return false;
    if (search) {
      const title = (i.title || '').toLowerCase();
      const desc = (i.description || '').toLowerCase();
      const context = (i.context || '').toLowerCase();
      if (!title.includes(search) && !desc.includes(search) && !context.includes(search)) return false;
    }
    return true;
  });

  // Sort
  if (sortCol) {
    const prioOrder = { critical: 0, high: 1, medium: 2, low: 3 };
    const depthOrder = { deep: 0, standard: 1, light: 2 };
    const estOrder = { large: 0, medium: 1, small: 2 };
    filtered.sort((a, b) => {
      let va, vb;
      if (sortCol === 'priority') { va = prioOrder[a.priority] ?? 99; vb = prioOrder[b.priority] ?? 99; }
      else if (sortCol === 'depth') { va = depthOrder[a.depth] ?? 99; vb = depthOrder[b.depth] ?? 99; }
      else if (sortCol === 'estimate') { va = estOrder[a.estimate] ?? 99; vb = estOrder[b.estimate] ?? 99; }
      else { va = (a[sortCol] || '').toLowerCase(); vb = (b[sortCol] || '').toLowerCase(); }
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });
  }

  document.getElementById('filter-count').textContent = `显示 ${filtered.length} / ${issues.length}`;

  tbody.innerHTML = filtered.map(i => {
    const deps = (i.dependencies || []);
    const depText = deps.length ? deps.map(d => `<span class="deps-badge" data-dep="${d}">#${d}</span>`).join(' ') : '—';
    const isHighlight = highlightIssueId !== null && i.id === highlightIssueId;
    return `
      <tr class="row-${i.priority}${isHighlight ? ' highlight' : ''}" data-id="${i.id}">
        <td class="cell-id">#${i.id}</td>
        <td>
          <div class="issue-title" data-id="${i.id}">${escHtml(i.title)}</div>
          <div class="issue-desc">${escHtml(i.description || i.context || '')}</div>
        </td>
        <td><span class="priority-tag priority-${i.priority}">${i.priority}</span></td>
        <td><span class="depth-tag depth-${i.depth}">${i.depth}</span></td>
        <td><span class="estimate-tag estimate-${i.estimate}">${i.estimate}</span></td>
        <td>${depText}</td>
      </tr>
    `;
  }).join('');

  // Attach click handlers
  tbody.querySelectorAll('.issue-title').forEach(el => el.addEventListener('click', () => showIssueDetail(parseInt(el.dataset.id))));
  tbody.querySelectorAll('.deps-badge').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); highlightIssue(parseInt(el.dataset.dep)); }));
}

function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Graph ──
function renderGraph(data) {
  const container = document.getElementById('graph-container');
  container.innerHTML = '';

  const issues = data.issues;
  const deps = data.dependency_graph;
  if (!deps || !deps.edges || deps.edges.length === 0) {
    container.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:40px;">无依赖关系 — 所有 Issue 可并行开发</p>';
    return;
  }

  // Build issue map
  const issueMap = {};
  for (const i of issues) issueMap[i.id] = i;

  const prioColor = { critical: '#f85149', high: '#d29922', medium: '#58a6ff', low: '#8b949e' };

  // Create the input graph
  const g = new dagre.graphlib.Graph();
  g.setGraph({ rankdir: 'LR', nodesep: 40, ranksep: 60, marginx: 20, marginy: 20 });
  g.setDefaultEdgeLabel(() => ({}));

  // Add nodes
  const edgeSet = new Set(deps.edges.map(e => `${e.from}-${e.to}`));
  const allNodeIds = new Set();
  deps.edges.forEach(e => { allNodeIds.add(e.from); allNodeIds.add(e.to); });
  // Also add nodes that have no edges but are in the issue list
  for (const i of issues) {
    if (allNodeIds.has(i.id) || (i.dependencies && i.dependencies.length > 0)) {
      if (!allNodeIds.has(i.id)) allNodeIds.add(i.id);
    }
  }
  // Actually add ALL issues that are in the graph
  for (const nid of deps.nodes || []) {
    allNodeIds.add(nid);
  }

  allNodeIds.forEach(id => {
    const iss = issueMap[id];
    const label = iss ? `${iss.id}` : `#${id}`;
    const color = iss ? (prioColor[iss.priority] || '#8b949e') : '#8b949e';
    g.setNode(id.toString(), {
      label: label,
      style: `fill: ${color}; stroke: ${color}88; stroke-width: 2;`,
      labelStyle: 'fill: #fff; font-weight: 600; font-size: 13px;',
      shape: 'rect',
      width: 50,
      height: 36,
      rx: 6,
      ry: 6,
    });
  });

  // Add edges
  deps.edges.forEach(e => {
    g.setEdge(e.from.toString(), e.to.toString(), {
      style: 'stroke: #30363d; stroke-width: 2; fill: none;',
      arrowheadStyle: 'fill: #30363d;',
      arrowhead: 'vee',
    });
  });

  // Render
  const svg = d3.select('#graph-container').append('svg');
  const inner = svg.append('g');

  const render = new dagreD3.render();
  render(inner, g);

  // Adjust SVG size
  const svgNode = svg.node();
  const graphWidth = g.graph().width + 40;
  const graphHeight = g.graph().height + 40;
  svg.attr('width', graphWidth).attr('height', Math.max(graphHeight, 200));
  svg.attr('viewBox', `0 0 ${graphWidth} ${Math.max(graphHeight, 200)}`);

  // Click handlers on nodes
  inner.selectAll('g.node').on('click', function(actualId) {
    const id = parseInt(actualId);
    showIssueDetail(id);
  }).on('mouseenter', function(actualId) {
    const id = parseInt(actualId);
    highlightIssue(id);
  }).on('mouseleave', function() {
    // Don't clear highlight on mouse leave, only on click elsewhere
  });

  // Zoom
  let zoomLevel = 1;
  document.getElementById('zoom-in').onclick = () => { zoomLevel = Math.min(3, zoomLevel + 0.2); applyZoom(); };
  document.getElementById('zoom-out').onclick = () => { zoomLevel = Math.max(0.3, zoomLevel - 0.2); applyZoom(); };
  document.getElementById('zoom-reset').onclick = () => { zoomLevel = 1; applyZoom(); };

  function applyZoom() {
    inner.attr('transform', `scale(${zoomLevel})`);
    svg.attr('width', graphWidth * zoomLevel).attr('height', Math.max(graphHeight, 200) * zoomLevel);
  }
}

// ── Issue Detail Modal ──
function showIssueDetail(id) {
  if (!currentPlanData) return;
  const issue = currentPlanData.issues.find(i => i.id === id);
  if (!issue) return;

  const root = document.getElementById('modal-root');
  const deps = (issue.dependencies || []).length
    ? issue.dependencies.map(d => `#${d}`).join(', ')
    : '无';

  const acHtml = (issue.acceptance_criteria || []).map(a => `<li>${escHtml(a)}</li>`).join('');

  root.innerHTML = `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <button class="close-btn" id="modal-close">&times;</button>
        <h2>#${issue.id} ${escHtml(issue.title)}</h2>
        <div class="modal-meta">
          <span class="priority-tag priority-${issue.priority}">${issue.priority}</span>
          <span class="depth-tag depth-${issue.depth}">${issue.depth}</span>
          <span class="estimate-tag estimate-${issue.estimate}">${issue.estimate}</span>
          &nbsp;· 前置依赖: ${deps}
        </div>
        ${issue.description ? `<h4>📝 功能描述</h4><p>${escHtml(issue.description)}</p>` : ''}
        ${issue.context ? `<h4>🔍 上下文</h4><p>${escHtml(issue.context)}</p>` : ''}
        ${acHtml ? `<h4>✅ 验收条件</h4><ul>${acHtml}</ul>` : ''}
        <h4>🏷️ 标签</h4>
        <p>${(issue.labels || []).map(l => `<span class="deps-badge">${escHtml(l)}</span>`).join(' ') || '—'}</p>
      </div>
    </div>
  `;

  document.getElementById('modal-close').onclick = closeModal;
  document.getElementById('modal-overlay').onclick = (e) => { if (e.target === e.currentTarget) closeModal(); };
  document.addEventListener('keydown', modalKeyHandler);
}

function closeModal() {
  const root = document.getElementById('modal-root');
  root.innerHTML = '';
  document.removeEventListener('keydown', modalKeyHandler);
}

function modalKeyHandler(e) {
  if (e.key === 'Escape') closeModal();
}

function highlightIssue(id) {
  highlightIssueId = id;
  // Re-render table to show highlight
  if (currentPlanData) renderTable(currentPlanData.issues);
}

// ── Event Listeners ──
function setupEventListeners() {
  // Plan selector
  document.getElementById('plan-select').addEventListener('change', (e) => {
    const slug = e.target.value;
    if (slug) {
      loadPlan(slug);
      // Update URL without reload
      const url = new URL(window.location);
      url.searchParams.set('plan', slug);
      window.history.replaceState({}, '', url);
    }
  });

  // Filters
  ['priority-filter', 'depth-filter', 'estimate-filter', 'search-input'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      if (currentPlanData) renderTable(currentPlanData.issues);
    });
    document.getElementById(id).addEventListener('change', () => {
      if (currentPlanData) renderTable(currentPlanData.issues);
    });
  });

  document.getElementById('clear-filters').addEventListener('click', () => {
    document.getElementById('priority-filter').value = 'all';
    document.getElementById('depth-filter').value = 'all';
    document.getElementById('estimate-filter').value = 'all';
    document.getElementById('search-input').value = '';
    if (currentPlanData) renderTable(currentPlanData.issues);
  });

  // Column sorting
  document.querySelectorAll('.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.sort;
      if (sortCol === col) sortDir *= -1;
      else { sortCol = col; sortDir = 1; }
      document.querySelectorAll('.sortable').forEach(s => s.classList.remove('sorted'));
      th.classList.add('sorted');
      th.querySelector('.sort-arrow').textContent = sortDir === 1 ? '↑' : '↓';
      if (currentPlanData) renderTable(currentPlanData.issues);
    });
  });
}
</script>
