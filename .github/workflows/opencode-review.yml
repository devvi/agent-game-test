name: review
# CI testing — runs ONLY on implement-stage PRs
# Uses Godot headless for GDScript testing

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-and-report:
    if: startsWith(github.event.pull_request.head.ref, 'impl/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Godot 4
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.1
          use-double-precision: false

      - name: Verify Godot
        run: godot --version

      - name: Run GDScript tests
        id: test
        run: |
          godot --headless --script tests/run_tests.gd 2>&1 | tee test-output.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run smoke test
        id: smoke
        run: |
          godot --headless --script tests/smoke_test.gd > smoke-output.log 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Test gate — block merge on failure
        if: steps.test.outputs.exit_code != '0' || steps.smoke.outputs.exit_code != '0'
        run: |
          echo "❌ Tests FAILED (unit exit: ${{ steps.test.outputs.exit_code }}, smoke exit: ${{ steps.smoke.outputs.exit_code }}). Blocking merge."
          exit 1

      - name: Upload test output artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-outputs-${{ github.event.pull_request.number }}
          path: |
            test-output.log
            smoke-output.log
          retention-days: 3

      - name: Comment failure summary on PR
        if: steps.test.outputs.exit_code != '0' || steps.smoke.outputs.exit_code != '0'
        env:
          UNIT_EXIT: ${{ steps.test.outputs.exit_code }}
          SMOKE_EXIT: ${{ steps.smoke.outputs.exit_code }}
        uses: actions/github-script@v7
        with:
          script: |
            var fs = require('fs');
            var summary = '';

            if (process.env.UNIT_EXIT !== '0') {
              var output = fs.readFileSync('test-output.log', 'utf8');
              var lines = output.split('\n');
              var failLines = lines.filter(function(l) {
                return l.includes('FAIL') || l.includes('AssertionError') || l.includes('failed') || l.includes('error');
              });
              summary += '### ❌ Unit Tests Failed\n```\n' + failLines.slice(-15).join('\n').substring(0, 500) + '\n```\n\n';
            }

            if (process.env.SMOKE_EXIT !== '0') {
              var smokeOutput = fs.readFileSync('smoke-output.log', 'utf8');
              var smokeLines = smokeOutput.split('\n');
              var smokeFails = smokeLines.filter(function(l) {
                return l.includes('❌');
              });
              summary += '### ❌ Smoke Test Failed\n```\n' + smokeFails.slice(-15).join('\n').substring(0, 500) + '\n```\n\n';
            }

            var baseUrl = process.env.GITHUB_SERVER_URL || 'https://github.com';
            var runUrl = baseUrl + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID;
            var body = 'Tests FAILED — dispatcher will auto-fix\n\n' + (summary || 'See run logs') + '\n' + runUrl;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
