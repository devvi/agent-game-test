name: sync-project-board
# Keep project board columns in sync with issue labels

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed, reopened]
  pull_request:
    types: [opened, closed, labeled, unlabeled]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
      projects: read
    steps:
      - name: Sync label → status
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue || context.payload.pull_request;
            if (!issue) return;

            const labels = issue.labels.map(l => l.name);

            const labelStatusMap = {
              'workflow/available': '📋 Available',
              'workflow/research':  '🔍 Research',
              'workflow/plan':      '📐 Plan',
              'workflow/implement': '⚙️ Implement',
              'workflow/self-correct': '🔧 Self-Correct',
              'status/done':        '✅ Done',
            };

            const activeLabel = Object.keys(labelStatusMap).find(l => labels.includes(l));

            console.log(`Issue #${issue.number}: labels=${labels.join(', ')}, active=${activeLabel}`);
