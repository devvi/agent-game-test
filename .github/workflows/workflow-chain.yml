name: workflow-chain
# Webhook: instantly advance workflow stage when a PR is merged

on:
  pull_request:
    types: [closed]

jobs:
  advance:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Advance issue workflow label on PR merge
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const prLabels = pr.labels.map(l => l.name);

            const workflowLabels = ['workflow/research', 'workflow/plan', 'workflow/implement', 'workflow/test'];
            let activeLabel = workflowLabels.find(l => prLabels.includes(l));
            if (!activeLabel) {
              const branch = pr.head.ref;
              const branchLabelMap = {
                'research/': 'workflow/research',
                'plan/':     'workflow/plan',
                'impl/':     'workflow/implement',
                'review/':   'workflow/test',
              };
              const matchedPrefix = Object.keys(branchLabelMap).find(p => branch.startsWith(p));
              if (matchedPrefix) {
                activeLabel = branchLabelMap[matchedPrefix];
                console.log(`PR #${pr.number} missing workflow label — derived "${activeLabel}" from branch "${branch}"`);
                try {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    labels: [activeLabel],
                  });
                } catch (labelErr) {
                  console.log(`PR #${pr.number}: could not add workflow label (${labelErr.status} ${labelErr.message})`);
                }
              } else {
                console.log(`PR #${pr.number} has no workflow label and branch "${branch}" doesn't match — skipping`);
                return;
              }
            }

            const body = pr.body || '';
            const parentMatch = body.match(/(?:Closes|parent)\s*#(\d+)/i);
            if (!parentMatch) {
              console.log(`PR #${pr.number}: no parent issue reference in body — can't advance`);
              return;
            }
            const parentNumber = parseInt(parentMatch[1]);

            const nextStage = {
              'workflow/research':  'workflow/plan',
              'workflow/plan':      'workflow/implement',
              'workflow/implement': 'workflow/test',
              'workflow/test':      null,
            };

            const nextLabel = nextStage[activeLabel];

            if (nextLabel) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parentNumber,
                labels: [nextLabel],
              });
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parentNumber,
                name: activeLabel,
              }).catch(() => {});

              console.log(`PR #${pr.number} merged → Issue #${parentNumber}: ${activeLabel} → ${nextLabel}`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parentNumber,
                body: `⏩ PR #${pr.number} (${activeLabel}) merged → advancing to **${nextLabel}**`,
              });
            } else {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parentNumber,
                state: 'closed',
              });
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parentNumber,
                name: activeLabel,
              }).catch(() => {});

              console.log(`PR #${pr.number} merged → Issue #${parentNumber} closed (implement → done)`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parentNumber,
                body: '🎉 Issue resolved — PR merged and complete.',
              });
            }
